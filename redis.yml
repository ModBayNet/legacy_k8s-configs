---
apiVersion: v1
kind: Service
metadata:
  name: redis
  labels:
    type: cache
    area: backend
spec:
  clusterIP: "None"
  selector:
    app: redis
  ports:
    - name: tcp
      port: 6379
      targetPort: tcp

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  labels:
    type: cache
    area: backend
spec:
  replicas: 1
  revisionHistoryLimit: 5
  selector:
    matchLabels:
      app: redis
      type: cache
      area: backend
  template:
    metadata:
      labels:
        app: redis
        type: cache
        area: backend
    spec:
      containers:
        - name: data
          image: redis:6-alpine
          imagePullPolicy: Always
          command: ["redis-server"]
          args: ["/config/redis.conf", "--requirepass", "$(REDIS_PASSWORD)"]
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: redis-credentials
                  key: password
          volumeMounts:
            - name: data
              mountPath: /data
            - name: config
              mountPath: /config
          ports:
            - name: tcp
              containerPort: 6379
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: redis-data
        - name: config
          configMap:
            name: redis-config
            items:
              - key: redis.conf
                path: redis.conf

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: redis-data
spec:
  storageClassName: redis-data
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi

---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: redis-data
spec:
  capacity:
    storage: 10Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: redis-data
  local:
    path: /home/modbay/redis
  nodeAffinity:
    required:
      nodeSelectorTerms:
        - matchExpressions:
            - key: type
              operator: In
              values:
                - modbay

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: redis-config
data:
  redis.conf: |
    save 900 1
    save 300 10
    save 60 10000

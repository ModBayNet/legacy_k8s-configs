---
apiVersion: v1
kind: Service
metadata:
  name: edgedb
spec:
  selector:
    app: edgedb-bd
  ports:
    - name: binary
      port: 5656
      targetPort: binary

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: edgedb
spec:
  replicas: 1
  selector:
    matchLabels:
      app: edgedb-bd
  template:
    metadata:
      labels:
        app: edgedb-bd
    spec:
      containers:
      - name: edgedb
        image: edgedb/edgedb:nightly
        imagePullPolicy: Always
        volumeMounts:
          - name: edgedb
            mountPath: /var/lib/edgedb/data
        ports:
        - name: binary
          containerPort: 5656
      volumes:
        - name: edgedb
          persistentVolumeClaim:
            claimName: modbay-edgedb-claim

---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: modbay-edgedb
spec:
  capacity:
    storage: 50Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: modbay-edgedb-storage
  local:
    path: /home/modbay/edb
  nodeAffinity:
    required:
      nodeSelectorTerms:
      - matchExpressions:
        - key: type
          operator: In
          values:
            - modbay

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: modbay-edgedb-claim
spec:
  storageClassName: modbay-edgedb-storage
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 50Gi
